<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .contact-info {
      margin-bottom: 20px;
      padding: 15px;
      background: #f5f7ff;
      border-radius: 10px;
      font-size: 14px;
      color: #444;
      line-height: 1.6;
    }

    .contact-info strong {
      color: #333;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #555;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      transition: 0.3s;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Contact Us</h2>

    <div class="contact-info">
      <p><strong>Address:</strong> No. 2-97, Nagaram Temple Rd, Near Nagaram Bus Stop, Hyderabad - 500083</p>
      <p><strong>Phone:</strong> +91 63037 07769</p>
      <p><strong>Email:</strong> prinyastyles@gmail.com</p>
    </div>

    <form>
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Phone</label>
        <input type="tel" placeholder="Enter your phone number">
      </div>

      <div class="input-group">
        <label>Message</label>
        <textarea placeholder="Write your message..."></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>

    <div class="footer-text">
      We'll get back to you soon ✨
    </div>
  </div>

</body>
</html>
